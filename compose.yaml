services:
  mcp-server:
    build:
      context: ./mcp-server
    container_name: argos-mcp-server
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/argos.sqlite
    ports:
      - "3001:3001"
    volumes:
      - sqlite-data:/app/data

  web-ui:
    build:
      context: ./web-ui
      args:
        NEXT_PUBLIC_ARGOS_API_BASE_URL: http://localhost:3001
    container_name: argos-web-ui
    environment:
      PORT: 3000
      NEXT_PUBLIC_ARGOS_API_BASE_URL: http://localhost:3001
    depends_on:
      - mcp-server
    ports:
      - "8080:3000"

volumes:
  sqlite-data:
